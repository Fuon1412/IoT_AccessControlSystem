services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-postgres}"
      POSTGRES_DB: "${POSTGRES_DB:-IoTAccessDb}"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-IoTAccessDb}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-i", "healthcheck", "-W", "3"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  backend:
    build:
      context: ./backend/IoTAccessAPI
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: >-
        Host=postgres;Port=5432;Database=${POSTGRES_DB:-IoTAccessDb};
        Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
      Jwt__Issuer: IoTAccessAPI
      Jwt__Audience: IoTAccessClient
      Jwt__Secret: "${JWT_SECRET:-change-this-in-production-minimum-32-chars!!}"
      DeviceSilenceThresholdMinutes: "5"
      AUTO_MIGRATE: "true"
      SEED_DATA: "${SEED_DATA:-true}"
      Seed__AdminUsername: "${ADMIN_USERNAME:-admin}"
      Seed__AdminPassword: "${ADMIN_PASSWORD:-admin123}"
      # Public broker by default (ESP32 + backend share it). Override for local mosquitto.
      Mqtt__Host: "${MQTT_HOST:-broker.hivemq.com}"
      Mqtt__Port: "${MQTT_PORT:-1883}"
      Mqtt__ClientId: "${MQTT_CLIENT_ID:-iot-backend-7f3a}"
      Mqtt__TopicPrefix: "${MQTT_TOPIC_PREFIX:-iot7f3a}"
      Mqtt__Username: "${MQTT_USERNAME:-}"
      Mqtt__Password: "${MQTT_PASSWORD:-}"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  frontend:
    build:
      context: ./frontend/app
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  mosquitto_data:
