services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "${SQL_SA_PASSWORD:-Dev@StrongPass123}"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: >
        /opt/mssql-tools18/bin/sqlcmd -S localhost -U SA
        -P "${SQL_SA_PASSWORD:-Dev@StrongPass123}"
        -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-i", "healthcheck", "-W", "3"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  backend:
    build:
      context: ./backend/IoTAccessAPI
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: >-
        Server=sqlserver;Database=IoTAccessDb;
        User Id=SA;Password=${SQL_SA_PASSWORD:-Dev@StrongPass123};
        TrustServerCertificate=True;
      Jwt__Issuer: IoTAccessAPI
      Jwt__Audience: IoTAccessClient
      Jwt__Secret: "${JWT_SECRET:-change-this-in-production-minimum-32-chars!!}"
      DeviceSilenceThresholdMinutes: "5"
      AUTO_MIGRATE: "true"
      Mqtt__Host: mosquitto
      Mqtt__Port: "1883"
      Mqtt__ClientId: iot-backend
      Mqtt__Username: "${MQTT_USERNAME:-}"
      Mqtt__Password: "${MQTT_PASSWORD:-}"
    depends_on:
      sqlserver:
        condition: service_healthy
      mosquitto:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend/app
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  sqlserver_data:
  mosquitto_data:
