# Mosquitto broker config — PRODUCTION
#
# Steps to enable:
#   1. Generate passwd file:
#        docker run --rm -v $(pwd)/mosquitto:/mosquitto/config eclipse-mosquitto:2 \
#          mosquitto_passwd -c /mosquitto/config/passwd backend-service
#        docker run --rm -v $(pwd)/mosquitto:/mosquitto/config eclipse-mosquitto:2 \
#          mosquitto_passwd -b /mosquitto/config/passwd esp32-door-01 <device_pass>
#
#   2. In docker-compose.yml, change volume mount to use this file:
#        - ./mosquitto/mosquitto.prod.conf:/mosquitto/config/mosquitto.conf:ro
#        - ./mosquitto/passwd:/mosquitto/config/passwd:ro
#
#   3. Set env vars:
#        MQTT_USERNAME=backend-service
#        MQTT_PASSWORD=<generated_pass>
#
#   4. Flash ESP32 with MQTT_USER / MQTT_PASS in config.h or NVS

listener 1883
allow_anonymous false
password_file /mosquitto/config/passwd

persistence true
persistence_location /mosquitto/data/
log_dest stdout
log_type error
log_type warning
log_type information
